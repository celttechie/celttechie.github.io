name: Generate and Deploy Resume PDF

on:
  push:
    branches:
      - master
      - modern-refresh-2026
    paths:
      - 'docs/sections/**'
      - 'templates/**'
      - 'scripts/**'

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install System Dependencies for WeasyPrint
      run: |
        sudo apt-get update
        sudo apt-get install -y libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install weasyprint markdown

    - name: Generate PDFs
      run: |
        python scripts/generate_resume.py -t templates/resume_master.md -o docs/resume_master.pdf
        python scripts/generate_resume.py -t templates/resume_master_2page.md -o docs/resume_master_2page.pdf -c templates/resume_print_2page.css

    - name: Commit and Push generated PDFs
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/resume_master.pdf docs/resume_master_2page.pdf
        git commit -m "auto-generate resume PDFs [skip ci]" || echo "No changes to commit"
        git push
