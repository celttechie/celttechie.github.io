name: ci 
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install weasyprint markdown mkdocs-material

      - name: Generate PDFs
        run: |
          python scripts/generate_resume.py -t templates/resume_master.md -o docs/resume_master.pdf -c templates/resume_print.css
          python scripts/generate_resume.py -t templates/resume_master_2page.md -o docs/resume_master_2page.pdf -c templates/resume_print_2page.css
          cp docs/resume_master.pdf resume_master.pdf
          cp docs/resume_master_2page.pdf resume_master_2page.pdf

      - name: Commit and Push generated PDFs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/resume_master.pdf docs/resume_master_2page.pdf resume_master.pdf resume_master_2page.pdf
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto-generate resume PDFs [skip ci]" && git push)

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force

